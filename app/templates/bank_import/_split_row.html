{# Eine Aufteilungs-Position: offener Posten + Teilbetrag. Genutzt fuer die
   vorbelegten Zeilen UND als <template> fuer neu hinzugefuegte (op/amt = None). #}
<div class="alloc-row d-flex gap-2 align-items-center">
  <select name="alloc_op_id" class="alloc-op form-select form-select-sm">
    <option value="">– offenen Posten wählen –</option>
    {% for o in all_open_items %}
      <option value="{{ o.id }}" data-balance="{{ o.open_balance }}"
              {% if op and o.id == op.id %}selected{% endif %}>
        {{ o.customer.name }} · {{ o.description }} · {{ o.amount | de_number(decimals=2) }} €
        (offen {{ o.open_balance | de_number(decimals=2) }} €)
      </option>
    {% endfor %}
  </select>
  <input type="number" step="0.01" min="0" name="alloc_amount"
         class="alloc-amount form-control form-control-sm" style="max-width: 130px;"
         placeholder="0,00"
         value="{% if amt is not none %}{{ '%.2f'|format(amt) }}{% endif %}">
  <button type="button" class="alloc-remove btn btn-sm btn-link text-danger p-1" title="Position entfernen">
    <i class="fas fa-times"></i>
  </button>
</div>
