<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Anmelden – WG Verwaltung</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0/dist/css/tabler.min.css">
</head>
<body class="antialiased d-flex flex-column">
<div class="page page-center">
  <div class="container container-tight py-4">
    <div class="text-center mb-4">
      <h1 class="navbar-brand navbar-brand-autodark d-inline-block">
        <i class="fas fa-tint text-primary me-2"></i><strong>WG</strong> Verwaltung
      </h1>
    </div>

    <div class="card card-md">
      <div class="card-body">
        <h2 class="h2 text-center mb-4">Bitte anmelden</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div class="alert alert-{{ 'danger' if category == 'danger' else 'warning' }}">{{ message }}</div>
          {% endfor %}
        {% endwith %}

        <form method="post" autocomplete="off">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">E-Mail</label>
            <div class="input-group input-group-flat">
              <input type="text" name="username" class="form-control" placeholder="E-Mail"
                     required autofocus autocomplete="email">
              <span class="input-group-text"><i class="fas fa-envelope text-muted"></i></span>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Passwort</label>
            <div class="input-group input-group-flat">
              <input type="password" name="password" class="form-control" placeholder="Passwort"
                     required autocomplete="current-password">
              <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
            </div>
          </div>
          <div class="form-footer">
            <button type="submit" class="btn btn-primary w-100">
              <i class="fas fa-sign-in-alt me-2"></i>Anmelden
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0/dist/js/tabler.min.js"></script>
</body>
</html>
