<table class="table table-hover table-striped mb-0">
  <thead class="thead-light">
    <tr>
      <th>Datum</th>
      <th>Konto</th>
      <th>Beschreibung</th>
      <th>Belegnr.</th>
      <th class="text-right">Betrag</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {% for b in bookings %}
    <tr>
      <td>{{ b.date.strftime('%d.%m.%Y') }}</td>
      <td>{{ b.account.name }}</td>
      <td>
        {{ b.description }}
        {% if b.invoice_id %}
        <a href="{{ url_for('invoices.detail', invoice_id=b.invoice_id) }}"
           class="badge badge-light ml-1">
          <i class="fas fa-file-invoice mr-1"></i>RE
        </a>
        {% endif %}
      </td>
      <td>{{ b.reference or '—' }}</td>
      <td class="text-right font-weight-bold {{ 'text-success' if b.amount > 0 else 'text-danger' }}">
        {{ "%.2f"|format(b.amount) }} €
      </td>
      <td class="text-right" style="white-space:nowrap">
        <a href="{{ url_for('accounting.booking_edit', booking_id=b.id) }}"
           class="btn btn-sm btn-outline-secondary">
          <i class="fas fa-edit"></i>
        </a>
        <form method="post" action="{{ url_for('accounting.booking_delete', booking_id=b.id) }}"
              style="display:inline"
              onsubmit="return confirm('Buchung wirklich löschen?')">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button type="submit" class="btn btn-sm btn-outline-danger">
            <i class="fas fa-trash"></i>
          </button>
        </form>
      </td>
    </tr>
    {% else %}
    <tr>
      <td colspan="6" class="text-center text-muted py-3">Keine Buchungen.</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
