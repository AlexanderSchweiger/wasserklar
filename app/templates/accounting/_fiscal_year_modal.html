{# Modal-Skelett fuer Buchungsjahr anlegen/bearbeiten. Body wird per HTMX
   (X-From-Modal-GET) geladen, Submit nativ via htmx → 204 + HX-Trigger
   (closeFiscalYearModal + fiscalYearSaved). #}
<div class="modal fade" id="fiscalYearModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="fas fa-calendar-plus me-2"></i> Buchungsjahr</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Schließen"></button>
      </div>
      <form id="fiscalYearForm" method="post" hx-headers='{"X-From-Modal": "1"}'>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="modal-body" id="fiscalYearModalBody">
          <div class="text-center text-muted py-4">
            <div class="spinner-border spinner-border-sm" role="status"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
            <i class="fas fa-times me-1"></i> Abbrechen
          </button>
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-save me-1"></i> Speichern
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
