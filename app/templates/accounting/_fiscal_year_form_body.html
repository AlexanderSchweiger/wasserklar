{# Form-Body fuer das Buchungsjahr-Modal — per HTMX in den
   fiscalYearModalBody geladen. Erwartet edit_mode + entweder fiscal_year
   (edit) oder default_year/default_start/default_end (neu). #}
{% include "_flash_inline.html" %}
<div class="mb-3">
  <label class="form-label">Jahr <span class="text-danger">*</span></label>
  <input type="number" name="year" class="form-control"
    value="{{ fiscal_year.year if edit_mode else default_year }}"
    min="2000" max="2100" required {% if edit_mode %}readonly{% endif %}>
</div>
<div class="mb-3">
  <label class="form-label">Startdatum <span class="text-danger">*</span></label>
  <input type="date" name="start_date" class="form-control"
    value="{{ fiscal_year.start_date.isoformat() if edit_mode else default_start }}" required>
</div>
<div class="mb-3">
  <label class="form-label">Enddatum <span class="text-danger">*</span></label>
  <input type="date" name="end_date" class="form-control"
    value="{{ fiscal_year.end_date.isoformat() if edit_mode else default_end }}" required>
</div>
<div class="mb-3">
  <label class="form-check">
    <input type="checkbox" name="is_vat_liable" value="1" class="form-check-input"
      {% if edit_mode and fiscal_year.is_vat_liable %}checked{% endif %}>
    <span class="form-check-label">
      <strong>Umsatzsteuerpflichtig</strong><br>
      <small class="text-muted">
        Wenn aktiv, werden Rechnungen mit USt ausgewiesen (Wasser-Standard: 10 %)
        und die Umsatzsteuer-Voranmeldung ist für dieses Jahr verfügbar.
      </small>
    </span>
  </label>
</div>
{% if not edit_mode %}
<script>
(function () {
  var root = document.getElementById('fiscalYearModalBody');
  if (!root) return;
  var yearEl = root.querySelector('input[name="year"]');
  var startEl = root.querySelector('input[name="start_date"]');
  var endEl = root.querySelector('input[name="end_date"]');
  if (!yearEl || !startEl || !endEl) return;
  yearEl.addEventListener('change', function () {
    var y = parseInt(yearEl.value);
    if (!isNaN(y) && y >= 2000 && y <= 2100) {
      startEl.value = y + '-01-01';
      endEl.value = y + '-12-31';
    }
  });
})();
</script>
{% endif %}
