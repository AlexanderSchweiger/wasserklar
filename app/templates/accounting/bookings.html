{% extends "base.html" %}
{% block title %}Buchungen {{ year }}{% endblock %}
{% block page_title %}<i class="fas fa-book mr-2"></i> Buchungen {% endblock %}
{% block content %}
<div class="card">
  <div class="card-header">
    <div class="filter-bar">
      <div class="form-group">
        <label class="mb-0 mr-1">Jahr</label>
        <input type="number" name="year" value="{{ year }}" min="2000" max="2100"
          class="form-control form-control-sm" style="width:90px"
          hx-get="{{ url_for('accounting.bookings') }}"
          hx-trigger="change"
          hx-target="#bookings-table"
          hx-include="[name='year'],[name='account_id'],[name='project_id']">
      </div>
      <div class="form-group">
        <label class="mb-0 mr-1">Konto</label>
        <select name="account_id" class="form-control form-control-sm"
          hx-get="{{ url_for('accounting.bookings') }}"
          hx-trigger="change"
          hx-target="#bookings-table"
          hx-include="[name='year'],[name='account_id'],[name='project_id']">
          <option value="">Alle Konten</option>
          {% for a in accounts %}
          <option value="{{ a.id }}" {{ 'selected' if account_id|string == a.id|string }}>
            {{ a.name }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="mb-0 mr-1">Projekt</label>
        <select name="project_id" class="form-control form-control-sm"
          hx-get="{{ url_for('accounting.bookings') }}"
          hx-trigger="change"
          hx-target="#bookings-table"
          hx-include="[name='year'],[name='account_id'],[name='project_id']">
          <option value="">Alle Projekte</option>
          {% for p in projects %}
          <option value="{{ p.id }}" {{ 'selected' if project_id|string == p.id|string }}>
            {{ p.name }}{% if p.closed %} (abgeschlossen){% endif %}
          </option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="card-tools">
      <a href="{{ url_for('accounting.booking_new') }}" class="btn btn-primary btn-sm">
        <i class="fas fa-plus mr-1"></i> Neue Buchung
      </a>
      <a href="{{ url_for('accounting.export_csv', year=year) }}"
         class="btn btn-secondary btn-sm ml-1">
        <i class="fas fa-file-csv mr-1"></i> CSV
      </a>
    </div>
  </div>
  <div class="card-body p-0" id="bookings-table">
    {% include "accounting/_bookings_table.html" %}
  </div>
</div>
{% endblock %}
