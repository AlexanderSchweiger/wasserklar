{% extends "base.html" %}
{% block title %}Kunden{% endblock %}
{% block page_title %}<i class="fas fa-users me-2"></i> Kunden{% endblock %}
{% block content %}
<div class="card">
  <div class="card-header d-flex align-items-center flex-wrap" style="gap:.5rem">
    <div class="input-group input-group-sm" style="width:280px">
      <input type="search" name="q" value="{{ q }}" class="form-control"
        placeholder="Kunden suchen…"
        hx-get="{{ url_for('customers.index') }}"
        hx-trigger="input changed delay:300ms, search"
        hx-target="#customer-table"
        hx-include="[name='q'],[name='ohne_objekt']">
      <span class="input-group-text"><i class="fas fa-search"></i></span>
    </div>
    <input type="hidden" name="ohne_objekt" value="{{ '1' if ohne_objekt else '0' }}">
    {% if ohne_objekt %}
    <a href="{{ url_for('customers.index', q=q) }}" class="btn btn-sm btn-warning">
      <i class="fas fa-filter me-1"></i> Ohne Objekt <i class="fas fa-times ms-1"></i>
    </a>
    {% else %}
    <a href="{{ url_for('customers.index', q=q, ohne_objekt=1) }}" class="btn btn-sm btn-outline-secondary">
      <i class="fas fa-filter me-1"></i> Ohne Objekt anzeigen
    </a>
    {% endif %}
    <button type="button" class="btn btn-sm btn-primary"
      hx-get="{{ url_for('customers.index') }}"
      hx-trigger="click"
      hx-target="#customer-table"
      hx-include="[name='q'],[name='ohne_objekt']">
      <i class="fas fa-search me-1"></i> Anzeigen
    </button>
    <a href="{{ url_for('customers.index') }}" class="btn btn-sm btn-outline-secondary">
      <i class="fas fa-times me-1"></i> Zurücksetzen
    </a>
    <div class="ms-auto">
      <a href="{{ url_for('customers.new') }}" class="btn btn-primary btn-sm">
        <i class="fas fa-plus me-1"></i> Neuer Kunde
      </a>
    </div>
  </div>
  <div class="card-body p-0" id="customer-table">
    {% include "customers/_table.html" %}
  </div>
</div>
{% endblock %}
