{% extends "base.html" %}
{% block title %}Objekte{% endblock %}
{% block page_title %}<i class="fas fa-home me-2"></i> Objekte{% endblock %}
{% block content %}
<div class="card">
  <div class="card-header">
    <div class="input-group input-group-sm" style="width:280px">
      <input type="search" name="q" value="{{ q }}" class="form-control"
        placeholder="Nummer, Straße, Ort…"
        hx-get="{{ url_for('properties.index') }}"
        hx-trigger="input changed delay:300ms, search"
        hx-target="#property-table"
        hx-include="[name='q'], [name='sort'], [name='dir']">
      <span class="input-group-text"><i class="fas fa-search"></i></span>
    </div>
    <input type="hidden" name="sort" value="{{ sort }}">
    <input type="hidden" name="dir" value="{{ dir }}">
    <div class="card-options">
      <a href="{{ url_for('properties.new') }}" class="btn btn-primary btn-sm">
        <i class="fas fa-plus me-1"></i> Neues Objekt
      </a>
    </div>
  </div>
  <div id="property-table">
    {% include "properties/_table.html" %}
  </div>
</div>
{% endblock %}
