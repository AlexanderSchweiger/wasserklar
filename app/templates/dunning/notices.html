{% extends "base.html" %}
{% block title %}Mahnungen{% endblock %}

{% block content %}
<div class="container-xl">
    <div class="page-header d-print-none mb-3">
        <div class="row align-items-center">
            <div class="col-auto">
                <h2 class="page-title">Mahnungen</h2>
            </div>
        </div>
    </div>

    <form method="post" id="notices-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="card">
        <div class="card-header">
            <h3 class="card-title">{{ notices | length }} Mahnung(en)</h3>
            <div class="card-options d-flex align-items-center gap-2">
                <select name="status" class="form-select form-select-sm" style="width:auto"
                        hx-get="{{ url_for('dunning.notices') }}"
                        hx-trigger="change"
                        hx-target="#notices-table"
                        hx-include="[name='status'],[name='q']">
                    <option value="">Alle Status</option>
                    {% for s in statuses %}
                    <option value="{{ s }}" {{ 'selected' if s == status_filter }}>{{ s }}</option>
                    {% endfor %}
                </select>
                <input type="text" name="q" class="form-control form-control-sm" style="width:200px"
                       placeholder="Suche…" value="{{ q }}"
                       hx-get="{{ url_for('dunning.notices') }}"
                       hx-trigger="input changed delay:300ms"
                       hx-target="#notices-table"
                       hx-include="[name='status'],[name='q']">
                <div class="btn-group btn-group-sm ms-2">
                    <button type="submit" formaction="{{ url_for('dunning.bulk_docx_merged') }}"
                            class="btn btn-outline-primary btn-sm" title="Auswahl als DOCX">
                        <i class="fas fa-file-word me-1"></i> DOCX
                    </button>
                    <button type="submit" formaction="{{ url_for('dunning.bulk_pdf_merged') }}"
                            class="btn btn-outline-primary btn-sm" title="Auswahl als PDF">
                        <i class="fas fa-file-pdf me-1"></i> PDF
                    </button>
                </div>
            </div>
        </div>
        <div class="card-body p-0" id="notices-table">
            {% include "dunning/_notices_table.html" %}
        </div>
    </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    document.addEventListener('change', function(e) {
        if (e.target && e.target.id === 'dn-select-all') {
            document.querySelectorAll('.dn-cb').forEach(function(cb) { cb.checked = e.target.checked; });
        }
    });
})();
</script>
{% endblock %}
