{# Modal-Skelett fuer den Zaehlerwechsel. Body wird per HTMX vom
   `meters.meter_replace`-Endpoint (X-From-Modal-GET) geladen, Submit per
   HTMX-POST → 204 + HX-Trigger (closeReplaceModal + meterReplaced). #}
<div class="modal fade" id="meterReplaceModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">
          <i class="fas fa-exchange-alt me-2"></i> Zählerwechsel
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Schließen"></button>
      </div>
      <form id="meterReplaceForm" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="modal-body" id="meterReplaceModalBody">
          <div class="text-center text-muted py-4">
            <div class="spinner-border spinner-border-sm" role="status"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
            <i class="fas fa-times me-1"></i> Abbrechen
          </button>
          <button type="submit" class="btn btn-danger">
            <i class="fas fa-exchange-alt me-1"></i> Zählerwechsel durchführen
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
