{% extends "base.html" %}
{% block title %}Zählertausch-Historie{% endblock %}
{% block page_title %}<i class="fas fa-history me-2"></i> Zählertausch-Historie{% endblock %}
{% block page_wrapper_class %}is-fill{% endblock %}
{% block content %}
<div class="card table-card">
  <div class="card-header">
    <div class="filter-bar">
      <div class="mb-3">
        <label class="form-label mb-0 me-1">Abrechnungsperiode</label>
        <select id="period-select" name="period_id"
          class="form-select form-select-sm" style="width:auto; display:inline-block"
          hx-get="{{ url_for('meters.replacements') }}"
          hx-trigger="change"
          hx-target="#replacements-table"
          hx-include="[name='q'],[id='period-select']">
          <option value="" {{ 'selected' if not period }}>Alle Perioden</option>
          {% for p in periods %}
          <option value="{{ p.id }}" {{ 'selected' if period and p.id == period.id }}>
            {{ p.name }}{{ ' — aktiv' if p.active else '' }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="input-group input-group-sm" style="width:260px">
        <input type="search" name="q" value="{{ q }}" class="form-control"
          placeholder="Objekt, Ort oder Zählernr. suchen…"
          hx-get="{{ url_for('meters.replacements') }}"
          hx-trigger="input changed delay:300ms"
          hx-target="#replacements-table"
          hx-include="[name='q'],[id='period-select']">
        <span class="input-group-text"><i class="fas fa-search"></i></span>
      </div>
      <div class="mb-3 d-flex gap-2 align-items-center">
        <a href="{{ url_for('meters.replacements') }}" class="btn btn-outline-secondary btn-sm">
          <i class="fas fa-times me-1"></i> Zurücksetzen
        </a>
      </div>
    </div>
  </div>
  <div id="replacements-table" class="table-fill">
    {% include "meters/_replacements_table.html" %}
  </div>
</div>
{% endblock %}
