{% extends "base.html" %}
{% block title %}Zähler-Verwaltung{% endblock %}
{% block page_title %}<i class="fas fa-tachometer-alt me-2"></i> Zähler{% endblock %}
{% block content %}
<div class="card">
  <div class="card-header">
    <div class="filter-bar">
      <div class="input-group input-group-sm" style="width:280px">
        <input type="search" name="q" value="{{ q }}" class="form-control"
          placeholder="Zählernr., Objekt, Besitzer, Standort…"
          hx-get="{{ url_for('meters.index') }}"
          hx-trigger="input changed delay:300ms"
          hx-target="#meters-table"
          hx-include="[name='q'],[name='show_inactive']">
        <span class="input-group-text"><i class="fas fa-search"></i></span>
      </div>
      <div class="form-check form-switch ms-3 mb-0">
        <input type="checkbox" class="form-check-input" id="show_inactive"
          name="show_inactive" value="1"
          {{ 'checked' if show_inactive }}
          hx-get="{{ url_for('meters.index') }}"
          hx-trigger="change"
          hx-target="#meters-table"
          hx-include="[name='q'],[name='show_inactive']">
        <label class="form-check-label" for="show_inactive">Ausgebaute anzeigen</label>
      </div>
      <div class="ms-auto d-flex gap-2 align-items-center">
        <a href="{{ url_for('meters.index') }}" class="btn btn-sm btn-outline-secondary">
          <i class="fas fa-times me-1"></i> Zurücksetzen
        </a>
      </div>
    </div>
    <div class="card-options">
      <a href="{{ url_for('meters.meter_new') }}" class="btn btn-primary btn-sm">
        <i class="fas fa-plus me-1"></i> Neuer Zähler
      </a>
      <a href="{{ url_for('meters.readings') }}" class="btn btn-outline-secondary btn-sm ms-1">
        <i class="fas fa-bolt me-1"></i> Zur Ablesung
      </a>
    </div>
  </div>
  <div id="meters-table">
    {% include "meters/_manage_table.html" %}
  </div>
</div>
{% endblock %}
