{% extends "base.html" %}
{% block title %}Rechnungen{% endblock %}
{% block page_title %}<i class="fas fa-file-invoice-dollar mr-2"></i> Rechnungen{% endblock %}
{% block content %}
<div class="card">
  <div class="card-header">
    <div class="filter-bar">
      <div class="form-group">
        <label class="mb-0 mr-1">Status</label>
        <select name="status" class="form-control form-control-sm"
          hx-get="{{ url_for('invoices.index') }}"
          hx-trigger="change"
          hx-target="#invoices-table"
          hx-include="[name='status'],[name='year'],[name='date_from'],[name='date_to'],[name='q'],[name='project_id']">
          <option value="">Alle Status</option>
          {% for s in statuses %}
          <option value="{{ s }}" {{ 'selected' if status_filter == s }}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="mb-0 mr-1">Rechn.Lauf Jahr</label>
        <input type="number" name="year" value="{{ year_filter }}" placeholder="—"
          class="form-control form-control-sm" style="width:90px"
          hx-get="{{ url_for('invoices.index') }}"
          hx-trigger="change"
          hx-target="#invoices-table"
          hx-include="[name='status'],[name='year'],[name='date_from'],[name='date_to'],[name='q'],[name='project_id']">
      </div>
      <div class="form-group">
        <label class="mb-0 mr-1">Datum von</label>
        <input type="date" name="date_from" value="{{ date_from }}"
          class="form-control form-control-sm" style="width:145px"
          hx-get="{{ url_for('invoices.index') }}"
          hx-trigger="change"
          hx-target="#invoices-table"
          hx-include="[name='status'],[name='year'],[name='date_from'],[name='date_to'],[name='q'],[name='project_id']">
      </div>
      <div class="form-group">
        <label class="mb-0 mr-1">bis</label>
        <input type="date" name="date_to" value="{{ date_to }}"
          class="form-control form-control-sm" style="width:145px"
          hx-get="{{ url_for('invoices.index') }}"
          hx-trigger="change"
          hx-target="#invoices-table"
          hx-include="[name='status'],[name='year'],[name='date_from'],[name='date_to'],[name='q'],[name='project_id']">
      </div>
      <div class="form-group">
        <label class="mb-0 mr-1">Projekt</label>
        <select name="project_id" class="form-control form-control-sm"
          hx-get="{{ url_for('invoices.index') }}"
          hx-trigger="change"
          hx-target="#invoices-table"
          hx-include="[name='status'],[name='year'],[name='date_from'],[name='date_to'],[name='q'],[name='project_id']">
          <option value="">Alle Projekte</option>
          {% for p in projects_for_filter %}
          <option value="{{ p.id }}" {{ 'selected' if project_id_filter|string == p.id|string }}>
            {{ p.name }}{% if p.closed %} (abgeschlossen){% endif %}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="input-group input-group-sm" style="width:220px">
        <input type="search" name="q" placeholder="Kundenname…" class="form-control"
          hx-get="{{ url_for('invoices.index') }}"
          hx-trigger="input changed delay:300ms"
          hx-target="#invoices-table"
          hx-include="[name='status'],[name='year'],[name='date_from'],[name='date_to'],[name='q'],[name='project_id']">
        <div class="input-group-append">
          <span class="input-group-text"><i class="fas fa-search"></i></span>
        </div>
      </div>
    </div>
    <div class="card-tools">
      <a href="{{ url_for('invoices.generate') }}" class="btn btn-primary btn-sm">
        <i class="fas fa-play mr-1"></i> Rechnungslauf
      </a>
      <a href="{{ url_for('invoices.tariffs') }}" class="btn btn-secondary btn-sm ml-1">
        <i class="fas fa-sliders-h mr-1"></i> Tarife
      </a>
      <a href="{{ url_for('invoices.counters') }}" class="btn btn-secondary btn-sm ml-1" title="Rechnungsnummer-Zähler">
        <i class="fas fa-sort-numeric-up"></i>
      </a>
    </div>
  </div>

  <!-- Sammelaktion-Leiste -->
  <form method="post" action="{{ url_for('invoices.bulk_action') }}" id="bulk-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div id="bulk-toolbar" class="px-3 py-2 border-bottom bg-light d-none"
         style="display:flex; align-items:center; gap:12px; flex-wrap:wrap">
      <span class="text-muted" id="bulk-count">0 ausgewählt</span>
      <div class="input-group input-group-sm" style="width:auto">
        <select name="action" class="form-control form-control-sm" id="bulk-action-select" style="min-width:180px">
          <option value="">— Aktion wählen —</option>
          <optgroup label="Status setzen">
            {% for s in statuses %}
            <option value="{{ s }}">Status: {{ s }}</option>
            {% endfor %}
          </optgroup>
          <option value="delete" class="text-danger">Löschen (nur Entwürfe)</option>
        </select>
        <div class="input-group-append">
          <button type="submit" class="btn btn-sm btn-warning" id="bulk-submit"
                  onclick="return confirmBulkAction()">
            <i class="fas fa-check mr-1"></i> Ausführen
          </button>
        </div>
      </div>
    </div>

    <div class="card-body p-0" id="invoices-table">
      {% include "invoices/_table.html" %}
    </div>
  </form>
</div>

<script>
(function () {
  function updateToolbar() {
    const checked = document.querySelectorAll('.invoice-cb:checked');
    const toolbar = document.getElementById('bulk-toolbar');
    const countEl = document.getElementById('bulk-count');
    if (checked.length > 0) {
      toolbar.classList.remove('d-none');
      toolbar.style.display = 'flex';
      countEl.textContent = checked.length + ' ausgewählt';
    } else {
      toolbar.classList.add('d-none');
      toolbar.style.display = '';
    }
    // sync select-all state
    const all = document.querySelectorAll('.invoice-cb');
    const selectAll = document.getElementById('select-all');
    if (selectAll) {
      selectAll.indeterminate = checked.length > 0 && checked.length < all.length;
      selectAll.checked = all.length > 0 && checked.length === all.length;
    }
  }

  function bindCheckboxes() {
    document.querySelectorAll('.invoice-cb').forEach(cb => {
      cb.addEventListener('change', updateToolbar);
    });
    const selectAll = document.getElementById('select-all');
    if (selectAll) {
      selectAll.addEventListener('change', function () {
        document.querySelectorAll('.invoice-cb').forEach(cb => {
          cb.checked = this.checked;
        });
        updateToolbar();
      });
    }
  }

  // Initial bind
  bindCheckboxes();

  // Re-bind after HTMX swaps (filter changes reload the table)
  document.addEventListener('htmx:afterSwap', function (e) {
    if (e.detail.target && e.detail.target.id === 'invoices-table') {
      bindCheckboxes();
      updateToolbar();
    }
  });
})();

function confirmBulkAction() {
  const action = document.getElementById('bulk-action-select').value;
  const count = document.querySelectorAll('.invoice-cb:checked').length;
  if (!action) {
    alert('Bitte eine Aktion auswählen.');
    return false;
  }
  if (action === 'delete') {
    return confirm(count + ' Rechnung(en) löschen? Nur Entwürfe werden gelöscht. Nicht rückgängig machbar.');
  }
  return confirm(count + ' Rechnung(en) auf "' + action.replace('Status: ', '') + '" setzen?');
}
</script>
{% endblock %}
