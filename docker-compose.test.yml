name: wg-test

services:
  wg:
    build: .
    ports:
      - "5001:5000"
    volumes:
      - ./instance:/app/instance    # generierte PDFs
    env_file:
      - .env.test
    # DATABASE_URL muss in .env.test gesetzt sein, z.B.:
    # mysql+pymysql://wg:passwort@192.168.0.12:3307/wasserklar_test?charset=utf8mb4
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/auth/login"]
      interval: 30s
      timeout: 10s
      retries: 3
