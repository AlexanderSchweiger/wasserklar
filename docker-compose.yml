services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wasserklar
      POSTGRES_USER: wkoss
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wkoss -d wasserklar"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
    - "5432:5432"

  wkoss:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./instance:/app/instance    # generierte PDFs
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://wkoss:${POSTGRES_PASSWORD}@postgres:5432/wasserklar
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/auth/login"]
      interval: 30s
      timeout: 10s
      retries: 3

  scheduler:
    build: .
    command: ["/usr/local/bin/supercronic", "/app/scheduler/crontab"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://wkoss:${POSTGRES_PASSWORD}@postgres:5432/wasserklar
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
