name: wkoss-prod

services:
  wkoss:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./instance:/app/instance    # generierte PDFs
    env_file:
      - .env.prod
    # DATABASE_URL muss in .env.prod gesetzt sein, z.B.:
    # mysql+pymysql://wkoss:passwort@192.168.0.12:3307/wasserklar_prod?charset=utf8mb4
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/auth/login"]
      interval: 30s
      timeout: 10s
      retries: 3

  scheduler:
    build: .
    command: ["/usr/local/bin/supercronic", "/app/scheduler/crontab"]
    env_file:
      - .env.prod
    # Dieselbe DATABASE_URL wie der wkoss-Container
    restart: unless-stopped
